<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproduciendo — StreamFlix</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="pagina-ver">
  <header class="navbar solido">
    <a class="brand" href="/">STREAM<span>FLIX</span></a>
    <a class="btn btn-info" href="/">← Volver al inicio</a>
  </header>

  <main class="ver-main">
    <!-- Reproductor (se rellena por JS: <video> o <iframe> según la fuente) -->
    <div class="reproductor" id="reproductor">
      <div class="cargando">Cargando reproductor…</div>
    </div>

    <section class="ver-info">
      <h1 id="ver-titulo">…</h1>
      <p class="ver-meta" id="ver-meta"></p>
      <p class="ver-sinopsis" id="ver-sinopsis"></p>
      <p class="ver-fuente" id="ver-fuente"></p>
    </section>

    <section class="fila" id="fila-relacionadas" style="display:none">
      <h2 class="fila-titulo">Películas similares</h2>
      <div class="carrusel" id="relacionadas"></div>
    </section>
  </main>

  <footer class="footer">
    <p>StreamFlix · Proyecto académico · Películas de dominio público vía
       <a href="https://archive.org" target="_blank" rel="noopener">Internet Archive</a>
       y fuentes añadidas por el usuario.</p>
  </footer>

  <!-- El id de la película llega desde el backend en la URL /ver/{id} -->
  <script>window.PELICULA_ID = "{{ pelicula_id }}";</script>
  <script type="module" src="/ver.js"></script>
</body>
</html>
